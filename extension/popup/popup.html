<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Login View -->
  <div id="loginView" class="view">
    <div class="login-container">
      <h2>YouTube Analytics Pro</h2>
      <div id="loginError" class="error"></div>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button id="loginBtn">Login</button>
      <button id="registerBtn" class="secondary">Register</button>
    </div>
  </div>

  <!-- Dashboard View -->
  <div id="dashboardView" class="view hidden">
    <header>
      <h2>YouTube Analytics</h2>
      <div class="user-controls">
        <span id="currentUser"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-target="tab-summary">Summary</button>
      <button class="tab-btn" data-target="tab-trend">Trend</button>
      <button class="tab-btn" data-target="tab-top">Top</button>
      <button class="tab-btn" data-target="tab-channels">Channels</button>
    </nav>

    <div class="content">
      
      <!-- Tab 1: Summary -->
      <div id="tab-summary" class="tab-content active">
        <section class="card">
          <h3>Summary Overview</h3>
          <table id="summaryTable">
            <thead>
              <tr>
                <th>Period</th>
                <th>Videos</th>
                <th>Watch Time</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </section>
      </div>

      <!-- Tab 2: Daily Trend -->
      <div id="tab-trend" class="tab-content hidden">
        <section class="card chart-container full-height">
          <h3>Avg. watch time/day</h3>
          <canvas id="barChart"></canvas>
        </section>
      </div>

      <!-- Tab 3: Top Channels -->
      <div id="tab-top" class="tab-content hidden">
        <section class="card chart-container full-height">
          <h3>Top 10 Channels</h3>
          <div class="donut-wrapper">
            <canvas id="donutChart"></canvas>
          </div>
        </section>
      </div>

      <!-- Tab 4: Channel Breakdown -->
      <div id="tab-channels" class="tab-content hidden scrollable-tab">
        <section class="card">
          <h3>All Channels</h3>
          <table id="channelTable">
            <thead>
              <tr>
                <th>Channel Name</th>
                <th>Watch Time</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </section>
      </div>

    </div>
  </div>

  <script src="chart.js"></script>
  <script src="popup.js"></script>
</body>
</html>
